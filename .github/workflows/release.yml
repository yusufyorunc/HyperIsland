name: Build & Release

# 触发条件
on:
  # 当代码推送到 main 分支时触发
  push:
    branches: [main]
  # 手动触发：在 GitHub Actions 页面可以手动运行此工作流
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 第一步：检出代码
      # fetch-depth: 2 表示获取最近 2 个提交的历史（用于版本对比）
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # 第二步：检测版本号是否变更
      # 从 pubspec.yaml 读取当前版本，与上一个提交的版本对比
      - name: Detect version change
        id: version
        run: |
          # 从 pubspec.yaml 中提取当前版本号（格式：1.5.0+2）
          CURRENT=$(grep '^version:' pubspec.yaml | awk '{print $2}')

          # 从上一个提交的 pubspec.yaml 中提取版本号（如果不存在则为空）
          PREVIOUS=$(git show HEAD~1:pubspec.yaml 2>/dev/null | grep '^version:' | awk '{print $2}' || echo "")

          # 分离版本名称（1.5.0）和版本代码（2）
          # 格式：versionName+versionCode
          VERSION_NAME=$(echo "$CURRENT" | cut -d'+' -f1)
          VERSION_CODE=$(echo "$CURRENT" | cut -d'+' -f2)

          # 将版本信息输出到 GitHub Actions 环境变量，供后续步骤使用
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE"  >> $GITHUB_OUTPUT

          # 判断版本是否变更
          if [ "$CURRENT" != "$PREVIOUS" ] && [ -n "$CURRENT" ]; then
            # 版本已变更，标记为 true，后续会发布 Release
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "::notice::Version changed: $PREVIOUS → $CURRENT, will release."
          else
            # 版本未变更，标记为 false，只编译不发布
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "::notice::No version change ($CURRENT), build only."
          fi

      # 第三步：安装 Java 环境
      # Flutter 编译 Android 需要 Java 17
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 第四步：安装 Flutter SDK
      # 使用稳定版本的 Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 第五步：安装 Flutter 依赖
      # 执行 flutter pub get 下载 pubspec.yaml 中定义的所有依赖包
      - name: Install dependencies
        run: flutter pub get

      # 第五步半：解码签名密钥
      # 将 base64 编码的密钥文件解码为 .jks 文件
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.jks

      # 第六步：编译 APK
      # 使用 release 模式编译（包含代码混淆和资源压缩）
      # 使用检测到的版本号作为 versionName 和 versionCode
      # 使用签名密钥进行签名
      - name: Build APK
        env:
          KEYSTORE_PATH: release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --build-name="${{ steps.version.outputs.version_name }}" \
            --build-number="${{ steps.version.outputs.version_code }}"

      # ────────────────────────────────────────────────────────────────────────
      # 以下步骤：上传编译产物和发布
      # ────────────────────────────────────────────────────────────────────────

      # 第七步：上传 APK 作为 GitHub Actions 工件
      # 所有编译都会上传，保留 30 天
      # 可在 Actions 页面的 "Artifacts" 部分下载
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: HyperIsland-v${{ steps.version.outputs.version_name }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # 第八步：重命名 APK 文件（仅在版本变更时执行）
      # 将编译输出的 app-release.apk 重命名为 HyperIsland-v1.5.0.apk
      # 这样便于在 Release 页面识别
      - name: Rename APK for release
        if: steps.version.outputs.changed == 'true'
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            "HyperIsland-v${{ steps.version.outputs.version_name }}.apk"

      # 第九步：创建 GitHub Release（仅在版本变更时执行）
      # 在 GitHub 的 Releases 页面创建新版本发布
      # 包含版本标签、发布说明和 APK 文件下载链接
      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          # 创建的 git tag 名称（格式：v1.5.0）
          tag_name: v${{ steps.version.outputs.version_name }}
          # Release 标题
          name: HyperIsland v${{ steps.version.outputs.version_name }}
          # Release 描述信息
          body: |
            ## HyperIsland v${{ steps.version.outputs.version_name }}

            - versionCode: `${{ steps.version.outputs.version_code }}`
          # 要上传到 Release 的文件
          files: HyperIsland-v${{ steps.version.outputs.version_name }}.apk
          # 不作为草稿发布（直接发布）
          draft: false
          # 不标记为预发布版本
          prerelease: false
