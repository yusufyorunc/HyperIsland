name: Auto Build & Release from Master

# Triggers
on:
  # Scheduled check every hour (runs on the repository default branch)
  schedule:
    - cron: "0 * * * *"
  # Manual run for forced builds or exceptions
  workflow_dispatch:
    inputs:
      version:
        description: "Override version name (format: 1.5.0, leave empty to auto-detect)"
        required: false
        type: string
      build_only:
        description: "Build only, do not publish release"
        required: false
        type: boolean
        default: false

jobs:
  # =======================================================
  # Job 1: Check for version updates on master
  # =======================================================
  check_update:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.version.outputs.should_build }}
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      previous_version: ${{ steps.version.outputs.previous_version }}
    steps:
      - name: Checkout source pubspec.yaml from master
        uses: actions/checkout@v4.2.2
        with:
          repository: ${{ github.repository }}
          ref: master
          sparse-checkout: pubspec.yaml
          sparse-checkout-cone-mode: false

      - name: Detect version and compare
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Parse version from master branch pubspec.yaml
          CURRENT_FULL=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION_NAME=$(echo "$CURRENT_FULL" | cut -d'+' -f1)
          VERSION_CODE=$(echo "$CURRENT_FULL" | cut -d'+' -f2)

          INPUT_VERSION="${{ github.event.inputs.version }}"
          VERSION_NAME=${INPUT_VERSION:-$VERSION_NAME}

          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

          # 2. Get latest release in this repository
          LATEST_RELEASE=$(gh release list --repo ${{ github.repository }} --limit 1 | awk '{print $1}' || echo "")
          PREVIOUS_VERSION=${LATEST_RELEASE#v}
          echo "previous_version=$PREVIOUS_VERSION" >> $GITHUB_OUTPUT

          # 3. Decide if build should run
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
             echo "::notice::Manually triggered, forcing build pipeline."
             echo "should_build=true" >> $GITHUB_OUTPUT
          else
             if gh release view "v$VERSION_NAME" --repo ${{ github.repository }} > /dev/null 2>&1; then
               echo "::notice::Version v$VERSION_NAME already exists in this repository, skipping build."
               echo "should_build=false" >> $GITHUB_OUTPUT
             else
               echo "::notice::New version v$VERSION_NAME detected on master, starting build."
               echo "should_build=true" >> $GITHUB_OUTPUT
             fi
          fi

  # =======================================================
  # Job 2: Build and release
  # =======================================================
  build_and_release:
    needs: check_update
    if: needs.check_update.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout full source from master
        uses: actions/checkout@v4.2.2
        with:
          repository: ${{ github.repository }}
          ref: master
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4.3.0
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: "3.41.6"
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"
          pub-cache-key: "flutter-pub-:os:-:channel:-:version:-:arch:-:hash:"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4.1.0
        with:
          gradle-version: wrapper
          cache-disabled: false

      - name: Install dependencies
        run: flutter pub get --offline || flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release --no-pub \
            --target-platform android-arm64 \
            --build-name="${{ needs.check_update.outputs.version_name }}" \
            --build-number="${{ needs.check_update.outputs.version_code }}"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4.6.0
        with:
          name: HyperIsland-v${{ needs.check_update.outputs.version_name }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          compression-level: 0

      - name: Rename APK for release
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            "HyperIsland-v${{ needs.check_update.outputs.version_name }}.apk"

      - name: Extract changelog
        id: changelog
        shell: pwsh
        run: |
          $version = "${{ needs.check_update.outputs.version_name }}"
          $previousVersion = "${{ needs.check_update.outputs.previous_version }}"
          $changelogContent = ""

          try {
            if (Test-Path 'CHANGELOG.md') {
              $changelogFile = Get-Content 'CHANGELOG.md' -Raw
              $escapedVersion = [regex]::Escape($version)
              $pattern = "(?ms)^#\s*V$escapedVersion\b[\s\S]*?(?=^#\s*V\d+\.\d+\.\d+\b|\Z)"
              $match = [regex]::Match($changelogFile, $pattern)

              if (-not $match.Success) {
                $pattern = "(?ms)^#\s*V$escapedVersion\s*\([\d-]+\)[\s\S]*?(?=^#\s*V\d+\.\d+\.\d+\s*\(|\Z)"
                $match = [regex]::Match($changelogFile, $pattern)
              }

              if ($match.Success) {
                $section = $match.Value.Trim()
                $lines = $section -split "`n"
                if ($lines.Length -gt 1) {
                  $body = ($lines | Select-Object -Skip 1) -join "`n"
                } else {
                  $body = $section
                }
                $body = $body.Trim()
                if ($body) {
                  echo "Extracted update notes from CHANGELOG.md"
                  $changelogContent = $body
                }
              }
            }
          } catch {
            echo "Failed to extract CHANGELOG: $_"
          }

          if (-not $changelogContent) {
            echo "Generating changelog from Git commit history"
            $commitLog = ""
            if ($previousVersion -ne "") {
              $commitLog = git log "v$previousVersion"..HEAD --pretty=format:"- %s" 2>$null
            }
            if (-not $commitLog) {
              $commitLog = git log --pretty=format:"- %s" -15 2>$null
            }
            $changelogContent = "### Changelog`n`n$commitLog"
          }

          echo "content<<EOF" >> $env:GITHUB_OUTPUT
          echo "$changelogContent" >> $env:GITHUB_OUTPUT
          echo "EOF" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        if: ${{ github.event.inputs.build_only != 'true' }}
        uses: softprops/action-gh-release@v2.1.0
        with:
          tag_name: v${{ needs.check_update.outputs.version_name }}
          name: HyperIsland v${{ needs.check_update.outputs.version_name }}
          body: ${{ steps.changelog.outputs.content }}
          files: HyperIsland-v${{ needs.check_update.outputs.version_name }}.apk
          draft: false
          prerelease: false
