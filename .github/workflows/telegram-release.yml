name: Telegram Release Notify

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to notify (e.g. v1.9.9)'
        required: true
        type: string

jobs:
  telegram:
    runs-on: ubuntu-latest

    steps:
      - name: Validate Telegram topic config
        run: |
          if [ -z "${{ secrets.TG_RELEASES_THREAD_ID }}" ]; then
            echo "::error::TG_RELEASES_THREAD_ID is not set. Add the Releases topic message_thread_id as a repository secret."
            exit 1
          fi

      - name: Get release info
        id: release_info
        run: |
          TAG="${{ github.event.inputs.tag || github.event.release.tag_name }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag_name=$TAG" >> $GITHUB_OUTPUT
            echo "html_url=$(gh release view "$TAG" --repo "${{ github.repository }}" --json url -q .url)" >> $GITHUB_OUTPUT
            echo "assets=$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets -q '.assets | map({name, browser_download_url: .url})')" >> $GITHUB_OUTPUT
          else
            echo "tag_name=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
            echo "html_url=${{ github.event.release.html_url }}" >> $GITHUB_OUTPUT
            echo 'assets=${{ toJson(github.event.release.assets) }}' >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Send release notification
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TG_CHAT_ID }}" \
            -d message_thread_id="${{ secrets.TG_RELEASES_THREAD_ID }}" \
            -d parse_mode="Markdown" \
            -d text="🚀 *新版本发布*
          🏷 版本：\`${{ steps.release_info.outputs.tag_name }}\`
          🔗 Release：${{ steps.release_info.outputs.html_url }}"

      - name: Download and send release assets
        run: |
          assets='${{ steps.release_info.outputs.assets }}'

          echo "$assets" | jq -r '.[] | [.name, .browser_download_url] | @tsv' | while IFS=$'\t' read -r name url; do
            echo "Downloading $name from $url"

            curl -L -o "$name" "$url"

            echo "Sending $name to Telegram"

            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendDocument" \
              -F "chat_id=${{ secrets.TG_CHAT_ID }}" \
              -F "message_thread_id=${{ secrets.TG_RELEASES_THREAD_ID }}" \
              -F "document=@$name" \
              -F "caption=📦 安装包：$name"
          done
