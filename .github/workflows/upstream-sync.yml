name: Sync Upstream

# 触发条件
on:
  # 定时任务：每 30 分钟检查一次上游仓库是否有新提交
  schedule:
    - cron: '*/30 * * * *'
  # 手动触发：在 GitHub Actions 页面可以手动运行此工作流
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 第一步：检出代码
      # fetch-depth: 0 表示获取完整的 git 历史（包括所有分支和标签）
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 第二步：同步上游仓库
      - name: Sync upstream
        run: |
          # 配置 git 用户信息（用于 rebase 操作）
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 添加上游仓库远程地址
          # 如果已存在则更新，不存在则添加
          git remote add upstream https://github.com/1812z/HyperIsland.git || git remote set-url upstream https://github.com/1812z/HyperIsland.git

          # 从上游仓库获取最新的 main 分支代码
          git fetch upstream main

          # 获取上游仓库 main 分支的最新提交 hash
          UPSTREAM_HEAD=$(git rev-parse upstream/main)

          # 获取本地仓库 main 分支的最新提交 hash
          LOCAL_HEAD=$(git rev-parse origin/main)

          # 比较两个 hash，如果不相同说明上游有新提交
          if [ "$UPSTREAM_HEAD" != "$LOCAL_HEAD" ]; then
            # 使用 rebase 同步上游代码，保持线性历史
            git rebase upstream/main

            # 推送 rebase 后的代码到本仓库的 main 分支
            git push origin main --force-with-lease

            # 输出成功信息
            echo "✓ Synced from upstream"
          else
            # 如果没有新提交，输出已是最新状态
            echo "✓ Already up to date"
          fi

