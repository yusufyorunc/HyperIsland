name: Sync Release to Another Repo

on:
  workflow_run:
    workflows: ["Build & Release"]
    types: [completed]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to sync (e.g. v1.9.9)'
        required: true
        type: string

jobs:
  sync-release:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.event.release.tag_name || github.event.workflow_run.head_sha || github.ref }}

      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            CURRENT_FULL=$(grep '^version:' pubspec.yaml | awk '{print $2}')
            VERSION_NAME=$(echo "$CURRENT_FULL" | cut -d'+' -f1)
            TAG="v$VERSION_NAME"
          fi

          if ! gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "::notice::No published release found for $TAG. Skipping sync."
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "found=true" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Get version info
        if: steps.release.outputs.found == 'true'
        id: version
        run: |
          CURRENT_FULL=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION_NAME=$(echo "$CURRENT_FULL" | cut -d'+' -f1)
          VERSION_CODE=$(echo "$CURRENT_FULL" | cut -d'+' -f2)
          
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "new_tag=${VERSION_CODE}-${VERSION_NAME}" >> $GITHUB_OUTPUT

      - name: Download release asset
        if: steps.release.outputs.found == 'true'
        id: download
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          gh release download "$TAG" \
            --pattern "*.apk" \
            --dir ./release
          APK_FILE=$(ls ./release/*.apk | head -n1)
          APK_NAME=$(basename "$APK_FILE")
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Get release info
        if: steps.release.outputs.found == 'true'
        id: release_info
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          RELEASE_NAME=$(gh release view "$TAG" --json name -q .name)
          BODY=$(gh release view "$TAG" --json body -q .body)
          
          echo "name=$RELEASE_NAME" >> $GITHUB_OUTPUT
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create release in target repo
        if: steps.release.outputs.found == 'true'
        uses: softprops/action-gh-release@v2.1.0
        with:
          repository: Xposed-Modules-Repo/io.github.hyperisland
          tag_name: ${{ steps.version.outputs.new_tag }}
          name: v${{ steps.version.outputs.version_name }}
          body: ${{ steps.release_info.outputs.content }}
          draft: false
          prerelease: false
          files: ./release/${{ steps.download.outputs.apk_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
